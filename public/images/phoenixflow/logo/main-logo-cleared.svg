<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 240" role="img" aria-labelledby="phoenixflow-logo-title phoenixflow-logo-desc">
  <title id="phoenixflow-logo-title">Phoenixflow official logo</title>
  <desc id="phoenixflow-logo-desc">PHOEN wordmark and XFLOW wordmark joined by a phoenix symbol replacing only the letter i.</desc>
  <defs>
    <linearGradient id="wordmark-bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d7a2" />
      <stop offset="18%" stop-color="#c99957" />
      <stop offset="42%" stop-color="#7e5434" />
      <stop offset="72%" stop-color="#d7b27a" />
      <stop offset="100%" stop-color="#5e3d24" />
    </linearGradient>
    <linearGradient id="symbol-bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efd6a5" />
      <stop offset="22%" stop-color="#bb8747" />
      <stop offset="55%" stop-color="#674323" />
      <stop offset="80%" stop-color="#c79a62" />
      <stop offset="100%" stop-color="#4f321c" />
    </linearGradient>
    <linearGradient id="symbol-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f3dfb8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#9a6533" stop-opacity="0.92" />
    </linearGradient>
    <filter id="phoenix-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#120c06" flood-opacity="0.34" />
    </filter>
  </defs>

  <g filter="url(#phoenix-shadow)">
    <text
      x="28"
      y="184"
      fill="url(#wordmark-bronze)"
      stroke="#23160d"
      stroke-width="0.85"
      paint-order="stroke fill"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="81"
      font-weight="500"
      letter-spacing="14"
      textLength="424"
      lengthAdjust="spacingAndGlyphs"
    >PHOEN</text>
    <text
      x="544"
      y="184"
      fill="url(#wordmark-bronze)"
      stroke="#23160d"
      stroke-width="0.85"
      paint-order="stroke fill"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="81"
      font-weight="500"
      letter-spacing="14"
      textLength="404"
