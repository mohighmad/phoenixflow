      <path d="M 11 12 C 23 5 32 -3 40 -15" stroke-width="6.1" />
      <path d="M 9 24 C 22 25 31 23 42 17" stroke-width="5.1" />

      <path d="M 1 46 C 9 21 12 -3 9 -24 C 8 -38 12 -47 20 -52 C 13 -55 5 -52 0 -44 C -6 -34 -7 -19 -3 1 C 1 21 -1 38 -8 50" stroke-width="9.7" />
      <path d="M 0 2 C -8 11 -9 23 -3 31 C 4 27 9 18 9 9 C 9 4 6 1 0 2 Z" fill="url(#symbol-glow)" stroke="#7c4e2f" stroke-width="1.2" />
